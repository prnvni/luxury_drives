<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Luxury Drives</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/common.css" rel="stylesheet">
    <link href="../css/login.css" rel="stylesheet"> 
</head>
<body>
   
    <nav class="navbar navbar-expand-lg custom-nav">
        <div class="container-fluid nav-container">
            <div class="logo">LUXURY DRIVES</div>
            <!-- ... standard navbar items ... -->
        </div>
    </nav>

    <div class="login-container">
        <div class="login-card shadow-lg">
            <h2 class="text-center mb-4">Reset Password</h2>
            
            <form id="forgotPasswordForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Enter your registered email</label>
                    <input type="email" class="form-control custom-input" id="email" required>
                </div>

                <div class="mb-3 d-none" id="newPasswordGroup">
                    <label for="newPassword" class="form-label">New Password</label>
                    <input type="password" class="form-control custom-input" id="newPassword">
                </div>

                <button type="submit" class="btn btn-primary login-btn w-100" id="submitBtn">
                    Find Account
                </button>
            </form>
            
            <p class="text-center mt-4 signup-text">
                Remembered it? <a href="login.html" class="signup-link">Login</a>
            </p>
        </div>
    </div>

    <script src="../js/forgot_password.js"></script>
</body>
</html>
