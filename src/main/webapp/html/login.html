<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Drives - Login Page</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="../css/login.css" rel="stylesheet">
    <link href="../css/common.css" rel="stylesheet">

</head>
<body>
<nav class="navbar navbar-expand-lg custom-nav">
        <div class="container-fluid nav-container">
            <div class="logo">LUXURY DRIVES</div>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="../html/home.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../html/cards.html">Available Cars</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../html/form.html">Booking</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="../html/faqpage.html">FAQ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="../html/login.html">
                        <button class="btn-login" id="login">Login</button></a>
                    </li>
                    <li class="nav-item">
                        <button class="btn-lightmode" id="lightmode">Light Mode</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-card shadow-lg">
            <h2 class="text-center mb-4" id="loginTitle">USER LOGIN
            </h2>
    <div class="login-type-toggle">
                <button class="toggle-btn active" id="userTab">User</button>
                <button class="toggle-btn" id="adminTab">Admin</button>
            </div>
            
             <form id="loginForm">
                <div class="mb-3">
                    <label for="usernameEmail" class="form-label">Email / Username</label>
                    <input type="text" class="form-control custom-input" id="usernameEmail" 
                           placeholder="Enter your email address" required>
                </div>

                <div class="mb-3 password-wrapper">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control custom-input" id="password" 
                           placeholder="Enter your password" required>
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>

                <!-- MFA Code Field (hidden by default) -->
                <div class="mb-3 d-none" id="mfaGroup">
                    <div class="alert alert-info">
                        A verification code has been sent to your phone.
                    </div>
                    <label for="verificationCode" class="form-label">Verification Code</label>
                    <input type="text" class="form-control custom-input" id="verificationCode" 
                           placeholder="123456">
                </div>

                <!-- required for firebase phone auth)-->
                 <div id="recaptcha-container"></div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">
                            Remember Me
                        </label>
                    </div>

                    <a href="password_recovery.html" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary login-btn w-100" href="../html/home.html">
                    Sign In
                </button>

                <button type="button" class="btn btn-success login-btn w-100 d-none" id="verifyBtn">
                    Verify Code
                </button>

            </form>

            <p class="text-center mt-4 signup-text">
                Don't have an account? <a href="registration.html" class="signup-link">Sign Up</a>
            </p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>

    <script src="../js/common.js"> </script>
    <script src="../js/login.js"> </script>
</body>
</html>
